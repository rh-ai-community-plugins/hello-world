apiVersion: backend.openshift.io/v1
kind: Plugin
metadata:
  name: hello-world
  displayName: Hello World
  description: A reference implementation and scaffold plugin for the RHOAI Dashboard
  version: 0.1.0
  link:
    url: https://github.com/rh-ai-community-plugins/hello-plugin-world
  iconPath: ''
  remote:
    type: module-federation
    spec:
      name: helloWorld
      scope: helloWorld
      # NOTE: Update this URL to point to your deployed container image.
      # Example: https://your-openshift-route/hello-world/remoteEntry.js
      remoteEntry: https://<registry>/rhoai-hello-world/remoteEntry.js
      paths:
        - type: route
          path: /hello-world
          extensions:
            - helloWorld/extensions
        - type: icon
          path: helloWorld/Icon
